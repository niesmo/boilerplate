services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: contactdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__contactdb: "Host=db;Port=5432;Database=contactdb;Username=app;Password=changeme"
    depends_on:
      - db

volumes:
  pgdata:
