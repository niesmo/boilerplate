name: Build and Test (main)

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BoilerplateApp.sln

      - name: Build
        run: dotnet build BoilerplateApp.sln --configuration Release --no-restore

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Verify Docker availability
        run: docker info

      - name: Restore
        run: dotnet restore BoilerplateApp.sln

      - name: Build
        run: dotnet build BoilerplateApp.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test BoilerplateApp.sln --configuration Release --no-build --verbosity normal
